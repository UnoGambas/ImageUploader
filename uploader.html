<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 이미지 쉐어</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        .upload-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea, button { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; }
        button { background-color: #3ecf8e; color: white; border: none; cursor: pointer; font-weight: bold; }
        .post-card { background: white; margin-top: 20px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .post-card img { width: 100%; display: block; }
        .post-card p { padding: 15px; margin: 0; }
    </style>
</head>
<body>

    <h2>📸 이미지 공유 앱</h2>

    <div class="upload-section">
        <input type="file" id="imageInput" accept="image/*">
        <textarea id="descInput" placeholder="이미지에 대한 설명을 적어주세요..."></textarea>
        <button onclick="uploadPost()">업로드하기</button>
    </div>

    <div id="feed"></div>

    <script>
        // 1. Supabase 설정 (본인의 정보로 교체하세요)
        const SUPABASE_URL = 'https://eqxdedztebcbgbblxody.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxeGRlZHp0ZWJjYmdiYmx4b2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjQ1MDksImV4cCI6MjA4ODQ0MDUwOX0.WpSF-sResnQKk2dEmIL4q9WS90gWEBTjdQpENmyOOjo';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. 게시글 불러오기 함수
        async function fetchPosts() {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) console.error('Error fetching:', error);
            else renderPosts(data);
        }

        // 3. 화면에 게시글 그리기
        function renderPosts(posts) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <img src="${post.image_url}" alt="Post Image">
                    <p>${post.description}</p>
                `;
                feed.appendChild(card);
            });
        }

        // 4. 업로드 실행 함수
        async function uploadPost() {
            const fileInput = document.getElementById('imageInput');
            const descInput = document.getElementById('descInput');
            
            if (fileInput.files.length === 0) return alert('이미지를 선택하세요!');

            const file = fileInput.files[0];
            const fileName = `${Date.now()}_${file.name}`;

            // A. Storage에 이미지 업로드
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('images')
                .upload(fileName, file);

            if (uploadError) return alert('업로드 실패: ' + uploadError.message);

            // B. 이미지의 공개 URL 가져오기
            const { data: urlData } = supabase.storage
                .from('images')
                .getPublicUrl(fileName);
            
            const publicUrl = urlData.publicUrl;

            // C. DB에 설명과 URL 저장
            const { error: dbError } = await supabase
                .from('posts')
                .insert([{ description: descInput.value, image_url: publicUrl }]);

            if (dbError) alert('DB 저장 실패: ' + dbError.message);
            else {
                alert('업로드 완료!');
                descInput.value = '';
                fileInput.value = '';
                fetchPosts(); // 리스트 새로고침
            }
        }

        // 초기 실행
        fetchPosts();
    </script>
</body>
</html>
